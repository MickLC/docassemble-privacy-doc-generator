---
# ===============================================
# CURRENT STATE ASSESSMENT
# Establishes what the client actually does
# today with personal data. This is the
# factual baseline for both the internal
# Privacy Policy and the Gap Analysis.
#
# Client assumption: starting from zero.
# No existing privacy programme assumed.
#
# matters[i].current_state must be explicitly initialised
# before any matters[i].current_state.* field is asked —
# see the matching note in org_profile.yml.
# ===============================================
code: |
  matters[i].initializeAttribute('current_state', DAObject)
  matters[i].current_state_initialized = True
sets: matters[i].current_state_initialized
---
question: |
  How does the client collect information? — ${ matters[i].org.name.text }
subquestion: |
  How does the client currently collect personal data?
  Select all that apply.
fields:
  - no label: matters[i].current_state.collection_methods
    datatype: checkboxes
    choices:
      - Website forms (contact, registration, checkout)
      - Mobile application
      - In-person / paper forms
      - Telephone
      - Email correspondence
      - Third-party data sources or data brokers
      - Social media platforms
      - CCTV or physical surveillance
      - Automated tracking (cookies, pixels, fingerprinting)
      - Employment / HR processes
      - Contracts and business agreements
      - Other
---
question: |
  Where is that information stored? — ${ matters[i].org.name.text }
subquestion: |
  Where does the client currently store personal data?
fields:
  - no label: matters[i].current_state.storage_systems
    datatype: checkboxes
    choices:
      - Cloud-based CRM (e.g. Salesforce, HubSpot)
      - Cloud file storage (e.g. Google Drive, OneDrive, Dropbox)
      - Cloud database (e.g. AWS, Azure, GCP)
      - Self-managed / rented servers (VPS, dedicated hosting)
      - On-premise servers
      - Employee laptops or devices
      - Email systems (e.g. Gmail, Outlook)
      - Accounting or ERP software
      - Marketing platforms (e.g. Mailchimp, Klaviyo)
      - Payment processors (e.g. Stripe, PayPal)
      - Physical files or paper records
      - Other
  - Does the client know where all personal data is stored?: matters[i].current_state.has_data_inventory
    datatype: yesnoradio
    label above field: True
---
question: |
  What privacy paperwork already exists? — ${ matters[i].org.name.text }
subquestion: |
  What privacy-related documentation does the client currently have?
  Check all that exist in any form, even if informal or out of date.
fields:
  - no label: matters[i].current_state.existing_docs
    datatype: checkboxes
    choices:
      - A published privacy policy or notice on their website
      - An internal data handling or processing policy
      - A record of processing activities (RoPA / data register)
      - Data retention schedule or policy
      - Data breach response plan
      - Data processing agreements with vendors/processors
      - Employee data protection training materials
      - Cookie policy or cookie consent mechanism
      - Consent records or consent management platform
      - Data subject / consumer rights request procedure
      - None of the above
  - If a website privacy policy exists, when was it last updated?: matters[i].current_state.last_policy_update
    datatype: date
    required: False
    show if: |
      matters[i].current_state.existing_docs['A published privacy policy or notice on their website']
---
question: |
  The client's vendors and who else touches this data — ${ matters[i].org.name.text }
subquestion: |
  Describe the client's current vendor and data-sharing landscape.
fields:
  - Approximately how many third-party vendors or service providers receive or access personal data?: matters[i].current_state.vendor_count
    choices:
      - None
      - 1–5
      - 6–20
      - More than 20
      - Unknown
  - Do any of the client's vendor contracts already include specific language about how the vendor can use, protect, or must return/delete the data?: matters[i].current_state.vendor_contracts_include_dp_terms
    datatype: yesnoradio
    hint: Legal category — data processing agreement (DPA) terms
  - Does the client give other companies access to personal data for their own separate use — not just to perform a service for the client?: matters[i].current_state.shares_data_commercially
    datatype: yesnoradio
    hint: Legal category — sale or sharing of personal data with third parties
---
question: |
  Requests from customers or employees — ${ matters[i].org.name.text }
subquestion: |
  How does the client currently handle privacy-related requests from individuals?
fields:
  - Has anyone ever asked the client to see, get a copy of, correct, or delete their personal information?: matters[i].current_state.has_received_rights_requests
    datatype: yesnoradio
    hint: Legal category — data subject access request (DSAR) / consumer rights request
  - Does the client have a written process for handling those kinds of requests?: matters[i].current_state.has_rights_request_procedure
    datatype: yesnoradio
  - Does the client currently have any mechanism for individuals to opt out of marketing or data processing?: matters[i].current_state.has_opt_out_mechanism
    datatype: yesnoradio
  - Has the client ever experienced a personal data breach or security incident?: matters[i].current_state.has_had_breach
    datatype: yesnoradio
  - Does the client have a documented breach response plan?: matters[i].current_state.has_breach_response_plan
    datatype: yesnoradio
---
question: |
  Staff awareness — ${ matters[i].org.name.text }
subquestion: |
  What is the current state of data protection awareness within the organisation?
fields:
  - Does anyone at the company own privacy or data protection as part of their job?: matters[i].current_state.has_privacy_lead
    datatype: yesnoradio
  - If yes, describe their role: matters[i].current_state.privacy_lead_role
    required: False
    show if: matters[i].current_state.has_privacy_lead
    hint: e.g. General Counsel, IT Manager, Operations Director
  - Have staff had any privacy or data-handling training in the last 12 months?: matters[i].current_state.has_staff_training
    datatype: yesnoradio
  - Does the client use automated systems (algorithms, AI/ML models, etc.) to make decisions about people that could meaningfully affect them — for example, automatically approving or denying something?: matters[i].current_state.uses_automated_decisions
    datatype: yesnoradio
    hint: Legal category — automated decision-making / profiling with legal or similarly significant effects
