---
# ===============================================
# OPERATIONAL FOOTPRINT
# Drives auto-detection of applicable
# privacy laws for this client matter.
#
# matters[i].footprint must be explicitly initialised
# before any matters[i].footprint.* field is asked — see
# the matching note in org_profile.yml.
# ===============================================
code: |
  matters[i].initializeAttribute('footprint', DAObject)
  matters[i].footprint_initialized = True
sets: matters[i].footprint_initialized
---
question: |
  Where the client does business — ${ matters[i].org.name.text }
subquestion: |
  A few questions about where the client actually operates and where its
  customers are, so we can figure out which privacy laws apply. Answer based
  on where the business actually has people, offices, or operations — not
  just where it's registered or incorporated.
fields:
  - label: Where does the client have offices, employees, or otherwise run its business?
    field: matters[i].footprint.operating_regions
    datatype: checkboxes
    hint: Legal category — operating in / having a legal establishment in a jurisdiction
    choices:
      - European Union (EU)
      - United Kingdom (UK)
      - California (US)
      - Texas (US)
      - Virginia (US)
      - Colorado (US)
      - Connecticut (US)
      - Delaware (US)
      - Iowa (US)
      - Indiana (US)
      - Kentucky (US)
      - Maryland (US)
      - Minnesota (US)
      - Montana (US)
      - Nebraska (US)
      - New Hampshire (US)
      - New Jersey (US)
      - Oregon (US)
      - Rhode Island (US)
      - Tennessee (US)
      - Utah (US)
      - Other US States
      - Canada
      - Australia
      - Other
  - label: Where are the client's customers or end users located?
    field: matters[i].footprint.consumer_regions
    datatype: checkboxes
    hint: Legal category — locations of consumers/data subjects
    choices:
      - European Union (EU)
      - United Kingdom (UK)
      - California (US)
      - Texas (US)
      - Virginia (US)
      - Colorado (US)
      - Connecticut (US)
      - Delaware (US)
      - Iowa (US)
      - Indiana (US)
      - Kentucky (US)
      - Maryland (US)
      - Minnesota (US)
      - Montana (US)
      - Nebraska (US)
      - New Hampshire (US)
      - New Jersey (US)
      - Oregon (US)
      - Rhode Island (US)
      - Tennessee (US)
      - Utah (US)
      - Other US States
      - Canada
      - Australia
      - Other
---
question: |
  A bit about the size of the business — ${ matters[i].org.name.text }
subquestion: |
  These figures determine whether the client crosses the numeric thresholds
  that trigger various US state privacy laws.
fields:
  - How much revenue does the client bring in per year (USD)?: matters[i].footprint.annual_revenue
    datatype: currency
    min: 0
    required: False
    hint: Enter 0 if not applicable or unknown
  - Roughly how many people's personal information does the client collect, use, or share in a year?: matters[i].footprint.consumer_volume
    datatype: integer
    min: 0
    required: False
    hint: Legal category — consumers whose personal data is processed annually (state privacy law volume threshold). Include all individuals whose data is collected, used, or shared.
  - Does the client let other companies (ad networks, data brokers, etc.) use its customer data to target ads across different sites and apps, or get anything of value in exchange for sharing that data?: matters[i].footprint.sells_data
    datatype: yesnoradio
    hint: Legal category — sale or sharing of personal data for cross-context behavioral advertising
  - Does the client collect sensitive details about people — things like health conditions, biometric data (fingerprints, face scans), or precise real-time location?: matters[i].footprint.processes_sensitive_data
    datatype: yesnoradio
    hint: Legal category — processing of sensitive personal data
  - Would the client count as a "small business" under the federal Small Business Administration's size standards for its industry?: matters[i].footprint.is_sba_small_business
    datatype: yesnoradio
    hint: Legal category — SBA small business classification (relevant for TDPSA's exemption)
    help: |
      SBA small business definitions vary by industry (typically based on
      employee count or annual revenue). Relevant for TDPSA exemption.
