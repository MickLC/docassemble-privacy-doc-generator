---
# ===============================================
# CCPA/CPRA-SPECIFIC QUESTIONS
# Part 1: Data processing details
# Part 2: Compliance posture assessment
# Only presented when CCPA/CPRA is confirmed.
#
# matters[i].ccpa (and its .posture child) must be
# explicitly initialised before any matters[i].ccpa.* field
# is asked — see the matching note in org_profile.yml.
# ===============================================
code: |
  matters[i].initializeAttribute('ccpa', DAObject)
  matters[i].ccpa.initializeAttribute('posture', DAObject)
  matters[i].ccpa_initialized = True
sets: matters[i].ccpa_initialized
---
# --- PART 1: DATA PROCESSING DETAILS ---

question: |
  Selling or sharing data for ads — ${ matters[i].org.name.text }
subquestion: |
  California law gives consumers the right to opt out when a business sells
  personal information or shares it for targeted advertising.
fields:
  - Does the client get money or anything of value in exchange for giving another company access to people's personal information?: matters[i].ccpa.sells_pi
    datatype: yesnoradio
    hint: Legal category — sale of personal information (CCPA/CPRA)
  - Does the client let ad companies use its customer data to target ads across different sites and apps, even without any payment changing hands?: matters[i].ccpa.shares_pi_for_advertising
    datatype: yesnoradio
    hint: Legal category — sharing for cross-context behavioral advertising
  - Does the client have a "Do Not Sell or Share My Personal Information" page? What's the URL?: matters[i].ccpa.opt_out_link
    required: False
    show if:
      variable: matters[i].ccpa.sells_pi
      is: True
  - Does the client automatically honor the "Global Privacy Control" browser signal that tells sites not to sell or share a visitor's data?: matters[i].ccpa.honours_gpc
    datatype: yesnoradio
    hint: Legal category — Global Privacy Control (GPC)
---
question: |
  Especially sensitive information — ${ matters[i].org.name.text }
subquestion: |
  California law creates a separate, more protected category for certain
  especially sensitive types of information.
fields:
  - Does the client collect any of these especially sensitive kinds of information?: matters[i].ccpa.collects_spi
    datatype: yesnoradio
    hint: Legal category — Sensitive Personal Information (SPI) under CPRA
  - label: Which kinds?
    field: matters[i].ccpa.spi_categories
    datatype: checkboxes
    show if: matters[i].ccpa.collects_spi
    choices:
      - Social Security / government ID numbers
      - Financial account login credentials
      - Precise geolocation
      - Racial or ethnic origin
      - Religious or philosophical beliefs
      - Union membership
      - Mail, email, or text message contents
      - Genetic data
      - Biometric data for identification
      - Health information
      - Sexual orientation or sex life
  - Does the client use that sensitive information for anything beyond what's strictly needed to provide the product or service — for example, using health data to target ads?: matters[i].ccpa.uses_spi_beyond_primary
    datatype: yesnoradio
    show if: matters[i].ccpa.collects_spi
    hint: Legal category — use of SPI beyond what's necessary (triggers CPRA's "limit use" right)
  - Does the client have a "Limit the Use of My Sensitive Personal Information" page? What's the URL?: matters[i].ccpa.spi_limit_link
    required: False
    show if: matters[i].ccpa.uses_spi_beyond_primary
---
question: |
  Who processes this data on the client's behalf? — ${ matters[i].org.name.text }
fields:
  - Briefly describe the vendors that process this data for the client: matters[i].ccpa.service_providers
    input type: area
    hint: |
      e.g. "Payment processing: Stripe (service provider);
      Cloud hosting: AWS (service provider);
      Analytics: Google Analytics (contractor)."
    required: False
---
question: |
  How can Californians reach out with a privacy request? — ${ matters[i].org.name.text }
subquestion: |
  How can California consumers exercise their privacy rights?
fields:
  - Where can consumers submit a rights request? (URL): matters[i].ccpa.rights_request_url
    required: False
  - Toll-free number for consumer rights requests: matters[i].ccpa.rights_request_phone
    required: False
  - Does the client verify a person's identity in two separate steps before deleting their data?: matters[i].ccpa.uses_verification
    datatype: yesnoradio
    hint: Legal category — two-step verification for deletion requests

# --- PART 2: CCPA/CPRA COMPLIANCE POSTURE ---

---
question: |
  CCPA/CPRA — Compliance Posture: Notices — ${ matters[i].org.name.text }
subquestion: |
  Answer based on what the client **currently has in place**.
fields:
  - Is a privacy notice at collection provided to California consumers at or before data collection (§1798.100)?: matters[i].ccpa.posture.notice_at_collection
    datatype: yesnoradio
  - Has the published privacy policy been updated within the last 12 months (§1798.130)?: matters[i].ccpa.posture.policy_updated_12mo
    datatype: yesnoradio
  - Does the privacy policy include all required CCPA/CPRA disclosures?: matters[i].ccpa.posture.policy_disclosures_complete
    datatype: yesnoradio
---
question: |
  CCPA/CPRA — Compliance Posture: Opt-Out and Rights — ${ matters[i].org.name.text }
fields:
  - Is a "Do Not Sell or Share My Personal Information" link or mechanism in place (§1798.120)?: matters[i].ccpa.posture.opt_out_mechanism_in_place
    datatype: yesnoradio
    show if: matters[i].ccpa.include_opt_out_section
  - Is the Global Privacy Control (GPC) signal honoured automatically?: matters[i].ccpa.posture.gpc_honoured
    datatype: yesnoradio
  - Is a "Limit Use of My Sensitive Personal Information" link or mechanism in place (§1798.121)?: matters[i].ccpa.posture.spi_limit_mechanism_in_place
    datatype: yesnoradio
    show if: matters[i].ccpa.include_spi_limit_link
  - Is there a documented procedure to respond to consumer rights requests within 45 days (§1798.105)?: matters[i].ccpa.posture.rights_procedure_45_days
    datatype: yesnoradio
---
question: |
  CCPA/CPRA — Compliance Posture: Deletion Requests — ${ matters[i].org.name.text }
fields:
  - Has the client implemented a two-step verification process for deletion requests?: matters[i].ccpa.posture.deletion_verification_in_place
    datatype: yesnoradio
