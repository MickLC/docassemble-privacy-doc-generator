---
# ===============================================
# REVIEW SCREEN
# Displays a full summary of matter answers
# before document generation.
# ===============================================
question: |
  Review — ${ matters[i].org.name.text }
subquestion: |
  Review all information below before generating the privacy policy.
  Click **Back** to make changes.

  ---

  **Matter Reference:** ${ matters[i].matter_ref }

  **Organisation:** ${ matters[i].org.name.text }
  ${ matters[i].org.address.on_one_line() }
  Privacy contact: ${ matters[i].org.contact_email }

  **Applicable Laws:** ${ comma_and_list(matters[i].confirmed_jurisdictions.true_values()) }

  ---

  **Data Collected:** ${ matters[i].data.types_collected.true_values() }

  **Processing Purposes:** ${ matters[i].data.purposes.true_values() }

  **Retention Policy:** ${ matters[i].data.retention_period }

  **Third-Party Sharing:** ${ 'Yes' if matters[i].data.third_party_sharing else 'No' }

  ---

  % if 'GDPR' in matters[i].confirmed_jurisdictions.true_values():
  **GDPR**
  Lawful bases: ${ matters[i].gdpr.lawful_bases.true_values() }
  DPO: ${ matters[i].gdpr.dpo.name.full() if matters[i].gdpr.dpo_exists else 'Not appointed' }
  International transfers: ${ 'Yes' if matters[i].gdpr.international_transfers else 'No' }
  % endif

  % if 'CCPA/CPRA' in matters[i].confirmed_jurisdictions.true_values():
  **CCPA/CPRA**
  Sells PI: ${ 'Yes' if matters[i].ccpa.sells_pi else 'No' }
  Shares PI for advertising: ${ 'Yes' if matters[i].ccpa.shares_pi_for_advertising else 'No' }
  Collects SPI: ${ 'Yes' if matters[i].ccpa.collects_spi else 'No' }
  Honours GPC: ${ 'Yes' if matters[i].ccpa.honours_gpc else 'No' }
  % endif

  % if 'TDPSA' in matters[i].confirmed_jurisdictions.true_values():
  **TDPSA**
  Role: ${ matters[i].tdpsa.role }
  Targeted advertising: ${ 'Yes' if matters[i].tdpsa.targeted_advertising else 'No' }
  Sells data: ${ 'Yes' if matters[i].tdpsa.sells_data else 'No' }
  Universal opt-out supported: ${ 'Yes' if matters[i].tdpsa.universal_opt_out_supported else 'No' }
  % endif

  % if 'VCDPA' in matters[i].confirmed_jurisdictions.true_values():
  **VCDPA**
  Role: ${ matters[i].vcdpa.role }
  Processes sensitive data: ${ 'Yes' if matters[i].vcdpa.processes_sensitive_data else 'No' }
  PIAs completed: ${ 'Yes' if matters[i].vcdpa.pia_completed else 'No' }
  % endif

  % for _spa in matters[i].state_acts.values():
  **${ _spa.code } — ${ _spa.full_name }**
  Role: ${ _spa.role }
  Processes sensitive data: ${ 'Yes' if _spa.processes_sensitive_data else 'No' }
  Sells data: ${ 'Yes' if _spa.sells_data else 'No' }
  PIAs completed: ${ 'Yes' if _spa.pia_completed else 'No' }

  % endfor

  % if 'Maryland Online Data Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
  **MD — Maryland Online Data Privacy Act**
  Role: ${ matters[i].md.role }
  Processes sensitive data: ${ 'Yes' if matters[i].md.processes_sensitive_data else 'No' }
  Sells data: ${ 'Yes' if matters[i].md.sells_data else 'No' }
  PIAs completed: ${ 'Yes' if matters[i].md.pia_completed else 'No' }
  % endif

  % if 'Minnesota Consumer Data Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
  **MN — Minnesota Consumer Data Privacy Act**
  Role: ${ matters[i].mn.role }
  Processes sensitive data: ${ 'Yes' if matters[i].mn.processes_sensitive_data else 'No' }
  Sells data: ${ 'Yes' if matters[i].mn.sells_data else 'No' }
  PIAs completed: ${ 'Yes' if matters[i].mn.pia_completed else 'No' }
  % endif

  % if 'Connecticut Data Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
  **CT — Connecticut Data Privacy Act**
  Role: ${ matters[i].ct.role }
  Processes sensitive data: ${ 'Yes' if matters[i].ct.processes_sensitive_data else 'No' }
  Sells data: ${ 'Yes' if matters[i].ct.sells_data else 'No' }
  PIAs completed: ${ 'Yes' if matters[i].ct.pia_completed else 'No' }
  % endif

  % if 'Iowa Consumer Data Protection Act' in matters[i].confirmed_jurisdictions.true_values():
  **IA — Iowa Consumer Data Protection Act**
  Role: ${ matters[i].ia.role }
  Processes sensitive data: ${ 'Yes' if matters[i].ia.processes_sensitive_data else 'No' }
  Sells data: ${ 'Yes' if matters[i].ia.sells_data else 'No' }
  % endif

  % if 'Utah Consumer Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
  **UT — Utah Consumer Privacy Act**
  Role: ${ matters[i].ut.role }
  Processes sensitive data: ${ 'Yes' if matters[i].ut.processes_sensitive_data else 'No' }
  Sells data: ${ 'Yes' if matters[i].ut.sells_data else 'No' }
  % endif

  ---

  **Compliance Gap Summary** (${ matters[i].gap_analysis['counts']['total'] } finding(s))

  % if matters[i].gap_analysis['counts']['must_fix']:
  Must Fix: ${ matters[i].gap_analysis['counts']['must_fix'] }
  % for f in matters[i].gap_analysis['by_severity']['Must Fix']:
  * **${ f['jurisdiction'] } — ${ f['requirement'] }** (${ f['authority'] })
  % endfor
  % endif

  % if matters[i].gap_analysis['counts']['should_fix']:
  Should Fix: ${ matters[i].gap_analysis['counts']['should_fix'] }
  % for f in matters[i].gap_analysis['by_severity']['Should Fix']:
  * **${ f['jurisdiction'] } — ${ f['requirement'] }** (${ f['authority'] })
  % endfor
  % endif

  % if matters[i].gap_analysis['counts']['consider']:
  Consider Fixing: ${ matters[i].gap_analysis['counts']['consider'] }
  % for f in matters[i].gap_analysis['by_severity']['Consider Fixing']:
  * **${ f['jurisdiction'] } — ${ f['requirement'] }** (${ f['authority'] })
  % endfor
  % endif

  % if matters[i].gap_analysis['counts']['total'] == 0:
  No gaps identified against the compliance posture questions answered above.
  % endif

  Full findings, with citations and descriptions, are in the Gap Analysis
  Memo generated below.
continue button field: matters[i].review_done
