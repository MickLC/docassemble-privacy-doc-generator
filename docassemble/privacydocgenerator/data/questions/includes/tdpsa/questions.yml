---
# ===============================================
# TDPSA-SPECIFIC QUESTIONS (Texas)
# Part 1: Data processing details
# Part 2: Compliance posture assessment
# Only presented when TDPSA is confirmed.
#
# matters[i].tdpsa (and its .posture child) must be
# explicitly initialised before any matters[i].tdpsa.* field
# is asked — see the matching note in org_profile.yml.
# ===============================================
code: |
  matters[i].initializeAttribute('tdpsa', DAObject)
  matters[i].tdpsa.initializeAttribute('posture', DAObject)
  matters[i].tdpsa_initialized = True
sets: matters[i].tdpsa_initialized
---
# --- PART 1: DATA PROCESSING DETAILS ---

question: |
  The client's role under Texas law — ${ matters[i].org.name.text }
subquestion: |
  Texas privacy law treats a business differently depending on whether it
  decides how and why data is used, or just processes data on someone
  else's instructions.
fields:
  - label: For Texas consumers, is the client the one deciding how/why data is used, just following someone else's instructions, or both?
    field: matters[i].tdpsa.role
    hint: Legal category — controller vs. processor role
    choices:
      - Controller
      - Processor
      - Both controller and processor
  - Does the client have signed data-handling agreements with the vendors that process data on its behalf?: matters[i].tdpsa.has_dpa_with_processors
    datatype: yesnoradio
    hint: Legal category — Data Processing Agreement (DPA)
---
question: |
  Advertising, selling data, and opt-outs — ${ matters[i].org.name.text }
fields:
  - Does the client use personal data to target ads at specific people?: matters[i].tdpsa.targeted_advertising
    datatype: yesnoradio
    hint: Legal category — targeted advertising
  - Does the client sell personal data to other companies?: matters[i].tdpsa.sells_data
    datatype: yesnoradio
    hint: Legal category — sale of personal data
  - Does the client use automated profiling to make decisions that could meaningfully affect someone — for example, denying credit, housing, or a job?: matters[i].tdpsa.profiling_decisions
    datatype: yesnoradio
    hint: Legal category — profiling producing legal or similarly significant effects
  - Does the client automatically honor universal opt-out browser signals (like Global Privacy Control)?: matters[i].tdpsa.universal_opt_out_supported
    datatype: yesnoradio
    hint: Legal category — Universal Opt-Out Mechanism (UOOM)
  - Where can Texas consumers submit an opt-out request? (URL): matters[i].tdpsa.opt_out_url
    required: False
---
question: |
  Risk assessments for higher-risk activities — ${ matters[i].org.name.text }
subquestion: |
  Texas law requires a documented risk assessment before certain higher-risk
  activities — for example, targeted advertising, selling data, or
  processing sensitive or children's data.
fields:
  - Has the client done a written risk assessment for any of these higher-risk activities?: matters[i].tdpsa.dpa_completed
    datatype: yesnoradio
    hint: Legal category — Data Protection Assessment (DPA)
  - label: Which activities?
    field: matters[i].tdpsa.dpa_activities
    datatype: checkboxes
    show if: matters[i].tdpsa.dpa_completed
    choices:
      - Targeted advertising
      - Sale of personal data
      - Profiling with significant effects
      - Processing sensitive data
      - Processing children's data

# --- PART 2: TDPSA COMPLIANCE POSTURE ---

---
question: |
  TDPSA — Compliance Posture: Notices and Rights — ${ matters[i].org.name.text }
subquestion: |
  Answer based on what the client **currently has in place**.
fields:
  - Is a privacy notice provided to Texas consumers that meets TDPSA requirements (§541.101)?: matters[i].tdpsa.posture.privacy_notice_provided
    datatype: yesnoradio
  - Is there a documented procedure to respond to consumer rights requests within 45 days (§541.052)?: matters[i].tdpsa.posture.rights_procedure_45_days
    datatype: yesnoradio
  - Is an appeals procedure in place for denied consumer requests (§541.053)?: matters[i].tdpsa.posture.appeals_procedure
    datatype: yesnoradio
---
question: |
  TDPSA — Compliance Posture: Opt-Out and Sensitive Data — ${ matters[i].org.name.text }
fields:
  - Is a clear opt-out mechanism for targeted advertising, data sale, and profiling in place (§541.051)?: matters[i].tdpsa.posture.opt_out_mechanism_in_place
    datatype: yesnoradio
    show if: matters[i].tdpsa.include_opt_out_section
  - Does the client support the Universal Opt-Out Mechanism (UOOM) (§541.056)?: matters[i].tdpsa.posture.uoom_supported
    datatype: yesnoradio
  - Is opt-in consent obtained before processing sensitive data (§541.101)?: matters[i].tdpsa.posture.sensitive_data_consent_obtained
    datatype: yesnoradio
    show if: matters[i].footprint.processes_sensitive_data
---
question: |
  TDPSA — Compliance Posture: Contracts and Assessments — ${ matters[i].org.name.text }
fields:
  - Have required Data Protection Assessments been completed for high-risk processing (§541.105)?: matters[i].tdpsa.posture.dpa_assessments_completed
    datatype: yesnoradio
    show if:
      variable: matters[i].tdpsa.include_opt_out_section
      is: True
