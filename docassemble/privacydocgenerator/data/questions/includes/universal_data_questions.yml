---
# ===============================================
# UNIVERSAL DATA PROCESSING QUESTIONS
# Asked once per matter. Answers feed all
# jurisdiction-specific document sections.
#
# matters[i].data.types_collected and matters[i].data.purposes
# are NOT asked directly here — as of Phase 2 they are computed
# aggregates (a union across matters[i].processing_activities),
# so every existing consumer (jurisdiction_engine.requires_dpia,
# gdpr/logic.yml, review.yml) keeps working unmodified against a
# real DADict with the same .get()/.true_values() interface.
# See the three code blocks below, evaluated after
# processing_activities.yml in main.yml's per-matter flow.
#
# The first block exists solely to advertise `sets: matters[i].data` —
# without it, resolving matters[i].data.types_collected fails at the
# `.data` attribute access (raising on the intermediate path
# "matters[0].data", not the full path) before docassemble ever reaches
# a block whose `sets:` matches. Same gotcha as dpia/lia in
# processing_activities.yml — nested attributes need their own explicit
# initializer, one per level.
# ===============================================
code: |
  matters[i].initializeAttribute('data', DAObject)
sets: matters[i].data
---
code: |
  matters[i].data.initializeAttribute('types_collected', DADict)
  for activity in matters[i].processing_activities:
      for key in activity.data_categories.true_values():
          matters[i].data.types_collected[key] = True
  matters[i].data.types_collected.gathered = True
sets: matters[i].data.types_collected
---
code: |
  matters[i].data.initializeAttribute('purposes', DADict)
  for activity in matters[i].processing_activities:
      for key in activity.purposes.true_values():
          matters[i].data.purposes[key] = True
  matters[i].data.purposes.gathered = True
sets: matters[i].data.purposes
---
question: |
  How long does the client keep data, overall? — ${ matters[i].org.name.text }
subquestion: |
  You've already described retention for each specific activity — this is
  the chance to describe the client's overall approach, if there's a general
  policy that ties it together.
fields:
  - Overall retention approach: matters[i].data.retention_period
    input type: area
    hint: |
      Describe how long different categories of data are kept and why,
      e.g. "Transaction records: 7 years (tax compliance).
      Marketing data: until opt-out or 2 years of inactivity."
---
question: |
  Sharing data outside the company — ${ matters[i].org.name.text }
subquestion: |
  A few more details about who outside the company gets access to personal
  data, beyond what's already captured per activity.
fields:
  - Does the client share personal data with third parties?: matters[i].data.third_party_sharing
    datatype: yesnoradio
  - If so, who are they and why does data go to them?: matters[i].data.third_party_details
    input type: area
    show if: matters[i].data.third_party_sharing
    hint: |
      e.g. "Payment processors (Stripe), cloud hosting providers (AWS),
      analytics platforms (Google Analytics), marketing platforms (Mailchimp)."
    required: False
