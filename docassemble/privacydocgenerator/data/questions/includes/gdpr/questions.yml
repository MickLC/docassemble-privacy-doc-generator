---
# ===============================================
# GDPR-SPECIFIC QUESTIONS
# Part 1: Data processing details
# Part 2: Compliance posture assessment
# Only presented when GDPR is confirmed.
#
# matters[i].gdpr (and its .posture and .dpo children) must
# be explicitly initialised before any matters[i].gdpr.*
# field is asked — see the matching note in org_profile.yml.
# .dpo is an Individual (not Person) so .dpo.name.first/.last
# work, matching the fields below.
# ===============================================
code: |
  matters[i].initializeAttribute('gdpr', DAObject)
  matters[i].gdpr.initializeAttribute('posture', DAObject)
  matters[i].gdpr.initializeAttribute('dpo', Individual)
  matters[i].gdpr_initialized = True
sets: matters[i].gdpr_initialized
---
# --- PART 1: DATA PROCESSING DETAILS ---

question: |
  What's the legal basis for this? — ${ matters[i].org.name.text }
subquestion: |
  GDPR requires a lawful basis for every use of personal data. Based on what
  we've discussed about the client's activities, select every basis that
  applies somewhere in the business.
fields:
  - label: Lawful basis (or bases) relied upon
    field: matters[i].gdpr.lawful_bases
    datatype: checkboxes
    hint: Legal category — GDPR Article 6 lawful basis
    choices:
      - Consent (Article 6(1)(a))
      - Contract performance (Article 6(1)(b))
      - Legal obligation (Article 6(1)(c))
      - Vital interests (Article 6(1)(d))
      - Public task (Article 6(1)(e))
      - Legitimate interests (Article 6(1)(f))
---
question: |
  Especially sensitive data — ${ matters[i].org.name.text }
subquestion: |
  GDPR singles out certain highly sensitive types of data — health, racial or
  ethnic origin, religious beliefs, sexual orientation, biometric data, and
  similar — for extra protection.
fields:
  - Does the client collect or use any of this kind of especially sensitive data?: matters[i].gdpr.processes_special_category
    datatype: yesnoradio
    hint: Legal category — special category data (GDPR Article 9)
  - label: Which legal condition justifies processing it?
    field: matters[i].gdpr.special_category_basis
    datatype: checkboxes
    show if: matters[i].gdpr.processes_special_category
    hint: Legal category — GDPR Article 9(2) condition
    choices:
      - Explicit consent (Article 9(2)(a))
      - Employment / social security obligations (Article 9(2)(b))
      - Vital interests (Article 9(2)(c))
      - Legitimate activities of a non-profit (Article 9(2)(d))
      - Data manifestly made public (Article 9(2)(e))
      - Legal claims (Article 9(2)(f))
      - Substantial public interest (Article 9(2)(g))
      - Medical purposes (Article 9(2)(h))
      - Public health (Article 9(2)(i))
      - Archiving / research / statistics (Article 9(2)(j))
---
question: |
  Sending data outside the UK/EU — ${ matters[i].org.name.text }
fields:
  - Does the client send personal data to countries outside the UK or European Economic Area?: matters[i].gdpr.international_transfers
    datatype: yesnoradio
  - label: What legal mechanism covers that transfer?
    field: matters[i].gdpr.transfer_mechanisms
    datatype: checkboxes
    show if: matters[i].gdpr.international_transfers
    hint: Attorney determination — GDPR Article 46 transfer mechanism
    choices:
      - Adequacy decision
      - Standard Contractual Clauses (SCCs)
      - Binding Corporate Rules (BCRs)
      - UK International Data Transfer Agreement (IDTA)
      - Derogations under Article 49
  - Which countries or regions receive this data?: matters[i].gdpr.transfer_destinations
    input type: area
    show if: matters[i].gdpr.international_transfers
    required: False
    hint: e.g. United States (SCCs in place), India (SCCs in place)
---
question: |
  Does the client have a Data Protection Officer? — ${ matters[i].org.name.text }
fields:
  - Has the client officially appointed a Data Protection Officer (DPO)?: matters[i].gdpr.dpo_exists
    datatype: yesnoradio
    hint: Legal category — GDPR Article 37 DPO appointment
  - DPO First Name: matters[i].gdpr.dpo.name.first
    show if: matters[i].gdpr.dpo_exists
  - DPO Last Name: matters[i].gdpr.dpo.name.last
    show if: matters[i].gdpr.dpo_exists
  - DPO Email: matters[i].gdpr.dpo.email
    datatype: email
    show if: matters[i].gdpr.dpo_exists
  - DPO Phone: matters[i].gdpr.dpo.phone
    show if: matters[i].gdpr.dpo_exists
    required: False
---
question: |
  Who's the regulator? — ${ matters[i].org.name.text }
subquestion: |
  Which data protection authority would handle complaints about the client?
fields:
  - Lead Supervisory Authority: matters[i].gdpr.supervisory_authority
    hint: e.g. Information Commissioner's Office (ICO) — UK; CNIL — France
  - Supervisory Authority Website: matters[i].gdpr.supervisory_authority_url
    required: False
    hint: e.g. https://ico.org.uk

# --- PART 2: GDPR COMPLIANCE POSTURE ---

---
question: |
  GDPR — Compliance Posture: Notices and Consent — ${ matters[i].org.name.text }
fields:
  - Is a privacy notice provided to data subjects at or before the point of data collection (Articles 13/14)?: matters[i].gdpr.posture.privacy_notice_provided
    datatype: yesnoradio
  - Is a compliant cookie consent mechanism in place (ePrivacy Directive)?: matters[i].gdpr.posture.cookie_consent_compliant
    datatype: yesnoradio
  - If consent is relied upon, is there a mechanism to record and evidence consent (Article 7)?: matters[i].gdpr.posture.consent_records_maintained
    datatype: yesnoradio
    show if: |
      matters[i].gdpr.lawful_bases['Consent (Article 6(1)(a))']
---
question: |
  GDPR — Compliance Posture: Rights and Contracts — ${ matters[i].org.name.text }
fields:
  - Is there a documented procedure for responding to data subject rights requests within one month (Articles 15–22)?: matters[i].gdpr.posture.rights_procedure_documented
    datatype: yesnoradio
  - If international transfers occur, is an appropriate transfer mechanism in place (Article 46)?: matters[i].gdpr.posture.transfer_mechanism_in_place
    datatype: yesnoradio
    show if: matters[i].gdpr.international_transfers
