---
# ===============================================
# PROCESSING ACTIVITIES
# The central data model every downstream document
# (internal Privacy Policy, Privacy Statement, ROPA,
# DPIA report, LIA report) reads from. See the
# Architecture section of BUILD_PLAN.md.
#
# Gathered after data_map.yml since each activity's
# recipients are selected from matters[i].systems.
# Same nested-DAList mechanic as matters[i].systems —
# inner gather loop uses `j`. Each activity can also add
# missing systems/vendors inline (matters[i].systems is not
# required to be complete before this file runs) — see the
# new_systems block below, which merges into matters[i].systems.
# NEEDS LIVE-SERVER VERIFICATION (see BUILD_PLAN.md).
#
# matters[i].data.types_collected / matters[i].data.purposes
# are computed as aggregates of these activities — see the
# code blocks at the top of universal_data_questions.yml,
# included later in main.yml.
#
# complete_attribute='complete' is required (same reasoning
# as matters[i].systems in data_map.yml): object_type is a
# plain DAObject, so without it gather() treats each new item
# as immediately complete and never shows the fields screen.
#
# The name/purposes/data_categories/data_subject_categories
# fields below carry a `default:` sourced from
# suggested_name/suggested_purposes/suggested_data_categories/
# suggested_data_subject_categories — set (only on items
# pre-seeded via a business function) by business_functions.yml,
# included just before this file in main.yml. Manually-added
# items never get those suggested_* attributes at all, hence
# the hasattr() guard in each default: block.
# ===============================================
modules:
  - docassemble.privacydocgenerator.jurisdiction_engine
  - docassemble.privacydocgenerator.data_map_objects
---
code: |
  matters[i].initializeAttribute('processing_activities', DAList.using(object_type=DAObject, complete_attribute='complete'))
  matters[i].processing_activities_initialized = True
sets: matters[i].processing_activities_initialized
---
question: |
  Processing Activities — ${ matters[i].org.name.text }
subquestion: |
  A processing activity is a distinct purpose for which personal data is
  collected and used — e.g. "email marketing to customers," "payroll
  processing," "website analytics." Every downstream document (Privacy
  Statement, ROPA, DPIA, LIA) is built from this list, so capture each
  activity separately rather than describing the business as a whole.
yesno: matters[i].processing_activities.there_are_any
---
question: |
  Processing Activity — ${ matters[i].org.name.text }
fields:
  - Activity name: matters[i].processing_activities[j].name
    hint: e.g. Email marketing to customers, Payroll processing
    default: |
      matters[i].processing_activities[j].suggested_name if hasattr(matters[i].processing_activities[j], 'suggested_name') else ''
  - Description: matters[i].processing_activities[j].description
    input type: area
    required: False
  - label: Purpose(s) of this activity
    field: matters[i].processing_activities[j].purposes
    datatype: checkboxes
    default: |
      matters[i].processing_activities[j].suggested_purposes if hasattr(matters[i].processing_activities[j], 'suggested_purposes') else []
    choices:
      - Providing products or services
      - Processing payments and transactions
      - Customer support and communication
      - Marketing and promotional communications
      - Targeted or behavioural advertising
      - Analytics and service improvement
      - Legal and regulatory compliance
      - Employment and HR administration
      - Fraud prevention and security
      - Research and development
      - Sharing or selling to third parties
      - Other
  - label: Categor(y/ies) of data involved
    field: matters[i].processing_activities[j].data_categories
    datatype: checkboxes
    default: |
      matters[i].processing_activities[j].suggested_data_categories if hasattr(matters[i].processing_activities[j], 'suggested_data_categories') else []
    choices:
      - Identifiers (name, email, phone, address)
      - Government-issued ID numbers
      - Financial information (account numbers, payment card data)
      - Health or medical data
      - Biometric data
      - Precise geolocation data
      - Internet / network activity data
      - Cookies and usage data
      - Inferences drawn from personal data
      - Employment and HR data
      - Education records
      - Data relating to children (under 13 / under 16)
      - Racial or ethnic origin
      - Political opinions
      - Religious or philosophical beliefs
      - Trade union membership
      - Sexual orientation or gender identity
      - Criminal conviction data
      - Other
  - label: Categor(y/ies) of data subjects involved
    field: matters[i].processing_activities[j].data_subject_categories
    datatype: checkboxes
    default: |
      matters[i].processing_activities[j].suggested_data_subject_categories if hasattr(matters[i].processing_activities[j], 'suggested_data_subject_categories') else []
    choices:
      - Customers
      - Employees
      - Job applicants
      - Website visitors
      - Business contacts / vendors
      - Minors
      - Other
---
# -----------------------------------------------
# Inline vendor/system add — lets the attorney add a missing
# system/vendor right when this activity turns out to need one,
# instead of having to guess the whole inventory up front in
# data_map.yml. new_systems is a fresh per-activity DAList (inner
# loop letter `k`, since `j` is already bound to this activity by
# processing_activities.gather()); its items are gathered by the
# same generic SystemOrVendor block used for matters[i].systems
# (see data_map.yml), then merged into matters[i].systems below —
# matters[i].systems.gather() itself is never re-invoked.
# -----------------------------------------------
code: |
  matters[i].processing_activities[j].initializeAttribute('new_systems', DAList.using(object_type=SystemOrVendor, complete_attribute='complete'))
  matters[i].processing_activities[j].new_systems_initialized = True
sets: matters[i].processing_activities[j].new_systems_initialized
---
question: |
  New system or vendor for this activity?
subquestion: |
  Does "**${ matters[i].processing_activities[j].name }**" involve a system
  or vendor that isn't yet in your Vendor & System Inventory?

  % if matters[i].systems.number() > 0:
  Already in the inventory: ${ comma_and_list([s.name for s in matters[i].systems]) }.
  % endif

  If so, add it now — it will be available to select as a recipient below,
  and will stay in the inventory for later activities too.
yesno: matters[i].processing_activities[j].new_systems.there_are_any
---
question: |
  Another system or vendor to add for this activity?
yesno: matters[i].processing_activities[j].new_systems.there_is_another
---
code: |
  for new_sys in matters[i].processing_activities[j].new_systems:
      merged = matters[i].systems.appendObject()
      merged.name = new_sys.name
      merged.category = new_sys.category
      merged.hosting_location = new_sys.hosting_location
      merged.data_categories = new_sys.data_categories
      merged.is_sub_processor = new_sys.is_sub_processor
      if new_sys.is_sub_processor:
          merged.sub_processor_of = new_sys.sub_processor_of
      merged.dpa_in_place = new_sys.dpa_in_place
      merged.complete = True
  matters[i].processing_activities[j].new_systems_merged = True
sets: matters[i].processing_activities[j].new_systems_merged
---
question: |
  Processing Activity — Recipients & Handling
subquestion: |
  ${ matters[i].processing_activities[j].name }
fields:
  - label: Recipients (systems/vendors that receive this data)
    field: matters[i].processing_activities[j].recipients
    datatype: object_multiselect
    choices: matters[i].systems
    required: False
    hint: |
      Selected from the Vendor & System Inventory, including anything you
      just added above.
  - Does this activity involve transferring data internationally (outside the client's home jurisdiction)?: matters[i].processing_activities[j].international_transfer
    datatype: yesnoradio
  - Transfer mechanism used: matters[i].processing_activities[j].transfer_mechanism
    datatype: checkboxes
    show if: matters[i].processing_activities[j].international_transfer
    choices:
      - Adequacy decision
      - Standard Contractual Clauses (SCCs)
      - Binding Corporate Rules (BCRs)
      - UK International Data Transfer Agreement (IDTA)
      - Derogations under Article 49
      - Other / not yet determined
  - Retention period for this activity's data: matters[i].processing_activities[j].retention_period
    hint: e.g. "3 years after last purchase" or "duration of employment plus 7 years"
  - label: Lawful basis relied upon (GDPR Article 6)
    field: matters[i].processing_activities[j].lawful_basis
    datatype: checkboxes
    show if:
      code: |
        'GDPR' in matters[i].confirmed_jurisdictions.true_values()
    choices:
      - Consent (Article 6(1)(a))
      - Contract performance (Article 6(1)(b))
      - Legal obligation (Article 6(1)(c))
      - Vital interests (Article 6(1)(d))
      - Public task (Article 6(1)(e))
      - Legitimate interests (Article 6(1)(f))
  - label: Security measures in place for this activity's data
    field: matters[i].processing_activities[j].security_measures
    datatype: checkboxes
    choices:
      - Encryption at rest
      - Encryption in transit
      - Access controls / role-based permissions
      - Multi-factor authentication
      - Logging and monitoring
      - Regular access reviews
      - Pseudonymisation or anonymisation
      - Other
---
# Sequences the per-activity screens in order. Each reference here is
# the FIRST field of its bundled screen only (never a show-if-gated
# field standalone) — one reference pulls in that whole screen,
# hidden fields included, the same way .name already pulls in the
# first screen. This is deliberate: naming a conditionally-hidden
# field on its own here would reproduce the bug fixed in main.yml
# where matters[i].ccpa.posture.opt_out_mechanism_in_place was
# required unconditionally despite being behind a show if.
code: |
  matters[i].processing_activities[j].name
  matters[i].processing_activities[j].new_systems_initialized
  matters[i].processing_activities[j].new_systems.gather()
  matters[i].processing_activities[j].new_systems_merged
  matters[i].processing_activities[j].recipients
  matters[i].processing_activities[j].complete = True
sets: matters[i].processing_activities[j].complete
---
question: |
  Another processing activity to add?
yesno: matters[i].processing_activities.there_is_another
---
# -----------------------------------------------
# Derived fields — computed once per activity after
# the whole list is gathered, so nothing downstream
# has to re-derive them (and can never drift from
# the underlying facts). Mirrors the "centralize the
# projection" pattern in branching-and-multi-document.md.
# -----------------------------------------------
code: |
  for activity in matters[i].processing_activities:
      activity.is_high_risk = requires_dpia(
          activity.data_categories,
          activity.purposes
      )
      activity.relies_on_legitimate_interest = (
          'GDPR' in matters[i].confirmed_jurisdictions.true_values()
          and activity.lawful_basis.get('Legitimate interests (Article 6(1)(f))', False)
      )
      activity.no_lawful_basis = (
          'GDPR' in matters[i].confirmed_jurisdictions.true_values()
          and not any(activity.lawful_basis.values())
      )
      activity.missing_retention_period = not activity.retention_period
      activity.no_security_measures = not any(activity.security_measures.values())
      # dpia/lia and lia's three sub-tests must be explicitly
      # initialised here — plain attribute access does not
      # auto-create nested objects, it just raises "X.dpia is
      # undefined" the first time dpia_assessment.yml/
      # lia_assessment.yml reference them (see org_profile.yml).
      activity.initializeAttribute('dpia', DAObject)
      activity.initializeAttribute('lia', DAObject)
      activity.lia.initializeAttribute('purpose_test', DAObject)
      activity.lia.initializeAttribute('necessity_test', DAObject)
      activity.lia.initializeAttribute('balancing_test', DAObject)
  matters[i].processing_activities_derived = True
sets: matters[i].processing_activities_derived
