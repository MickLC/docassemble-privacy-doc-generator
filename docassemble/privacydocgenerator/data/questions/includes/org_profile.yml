---
# ===============================================
# ORGANISATION PROFILE
# Core client organisation details.
# Universal across all jurisdictions.
#
# matters[i].org must be explicitly initialised as a
# Person before any matters[i].org.* field is asked —
# plain attribute access doesn't auto-create nested
# objects, it just raises "matters[i].org is undefined".
# Person.init() also creates .name (Name, giving the
# .name.text used here for a single-string org name)
# and .address (a real Address object, so
# .org.address.on_one_line() works in review.yml).
# ===============================================
code: |
  matters[i].initializeAttribute('org', Person)
  matters[i].org_initialized = True
sets: matters[i].org_initialized
---
question: |
  Tell me about the client — ${ matters[i].matter_ref }
subquestion: |
  A few basics about the business itself.
fields:
  - What's the client's official registered/legal name?: matters[i].org.name.text
    hint: Legal category — legal name of the organization
  - Does the client do business under a different name (a DBA or trade name)?: matters[i].org.trading_name
    required: False
  - What's the client's business registration or company number, if it has one?: matters[i].org.reg_number
    required: False
  - What industry is the client in?: matters[i].org.industry
    choices:
      - Technology / SaaS
      - E-commerce / Retail
      - Healthcare
      - Financial Services
      - Legal Services
      - Education
      - Non-profit
      - Government / Public Sector
      - Other
---
question: |
  Where is the client located? — ${ matters[i].org.name.text }
fields:
  - Address Line 1: matters[i].org.address.address
  - Address Line 2: matters[i].org.address.unit
    required: False
  - City: matters[i].org.address.city
  - State / County: matters[i].org.address.state
    required: False
  - Postcode / ZIP: matters[i].org.address.zip
  - Country: matters[i].org.address.country
---
question: |
  Who should we contact about privacy matters? — ${ matters[i].org.name.text }
fields:
  - What email address should people use for privacy-related questions or requests?: matters[i].org.contact_email
    datatype: email
    hint: The email address for privacy-related enquiries
  - Does the client have a website? What's the URL?: matters[i].org.website
    required: False
