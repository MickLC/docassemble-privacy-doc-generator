---
# ===============================================
# VCDPA-SPECIFIC QUESTIONS (Virginia)
# Part 1: Data processing details
# Part 2: Compliance posture assessment
# Only presented when VCDPA is confirmed.
#
# matters[i].vcdpa (and its .posture child) must be
# explicitly initialised before any matters[i].vcdpa.* field
# is asked — see the matching note in org_profile.yml.
# ===============================================
code: |
  matters[i].initializeAttribute('vcdpa', DAObject)
  matters[i].vcdpa.initializeAttribute('posture', DAObject)
  matters[i].vcdpa_initialized = True
sets: matters[i].vcdpa_initialized
---
# --- PART 1: DATA PROCESSING DETAILS ---

question: |
  The client's role under Virginia law — ${ matters[i].org.name.text }
fields:
  - label: For Virginia consumers, is the client the one deciding how/why data is used, just following someone else's instructions, or both?
    field: matters[i].vcdpa.role
    hint: Legal category — controller vs. processor role
    choices:
      - Controller
      - Processor
      - Both
---
question: |
  Sensitive data and consent — ${ matters[i].org.name.text }
subquestion: |
  Virginia law requires the client to get opt-in consent before processing
  certain especially sensitive data.
fields:
  - Does the client process any especially sensitive data, as Virginia law defines it (health, biometric, precise location, children's data, etc.)?: matters[i].vcdpa.processes_sensitive_data
    datatype: yesnoradio
    hint: Legal category — sensitive data under VCDPA
  - Has the client gotten explicit opt-in consent before processing that sensitive data?: matters[i].vcdpa.sensitive_data_consent
    datatype: yesnoradio
    show if: matters[i].vcdpa.processes_sensitive_data
---
question: |
  Advertising, selling data, and profiling — ${ matters[i].org.name.text }
fields:
  - Does the client use personal data to target ads at specific people?: matters[i].vcdpa.targeted_advertising
    datatype: yesnoradio
    hint: Legal category — targeted advertising
  - Does the client sell personal data to other companies?: matters[i].vcdpa.sells_data
    datatype: yesnoradio
    hint: Legal category — sale of personal data
  - Does the client use automated profiling to make significant decisions about people — for example, denying credit, housing, or a job?: matters[i].vcdpa.profiling_opt_out
    datatype: yesnoradio
    hint: Legal category — profiling producing legal or similarly significant effects
  - Where can Virginia consumers submit a rights request? (URL): matters[i].vcdpa.rights_request_url
    required: False
---
question: |
  Risk assessments for higher-risk activities — ${ matters[i].org.name.text }
subquestion: |
  Virginia law requires a documented risk assessment (a Data Protection
  Impact Assessment, or PIA) before certain higher-risk activities.
fields:
  - Has the client done a written risk assessment for any of these higher-risk activities?: matters[i].vcdpa.pia_completed
    datatype: yesnoradio
    hint: Legal category — Data Protection Impact Assessment (PIA)
  - label: Which activities?
    field: matters[i].vcdpa.pia_activities
    datatype: checkboxes
    show if: matters[i].vcdpa.pia_completed
    choices:
      - Targeted advertising
      - Sale of personal data
      - Profiling with significant effects
      - Processing sensitive data
      - Processing children's data

# --- PART 2: VCDPA COMPLIANCE POSTURE ---

---
question: |
  VCDPA — Compliance Posture: Notices and Rights — ${ matters[i].org.name.text }
subquestion: |
  Answer based on what the client **currently has in place**.
fields:
  - Is a privacy notice provided to Virginia consumers that meets VCDPA requirements (§59.1-578)?: matters[i].vcdpa.posture.privacy_notice_provided
    datatype: yesnoradio
  - Is there a documented procedure to respond to consumer rights requests within 45 days (§59.1-581)?: matters[i].vcdpa.posture.rights_procedure_45_days
    datatype: yesnoradio
  - Is an appeals procedure in place for denied consumer requests (§59.1-581)?: matters[i].vcdpa.posture.appeals_procedure
    datatype: yesnoradio
---
question: |
  VCDPA — Compliance Posture: Opt-Out and Sensitive Data — ${ matters[i].org.name.text }
fields:
  - Is a clear opt-out mechanism for targeted advertising, data sale, and profiling in place (§59.1-578)?: matters[i].vcdpa.posture.opt_out_mechanism_in_place
    datatype: yesnoradio
    show if: matters[i].vcdpa.include_opt_out_section
  - Is opt-in consent obtained before processing sensitive data (§59.1-578)?: matters[i].vcdpa.posture.sensitive_data_consent_obtained
    datatype: yesnoradio
    show if: matters[i].vcdpa.processes_sensitive_data
---
question: |
  VCDPA — Compliance Posture: Contracts and Assessments — ${ matters[i].org.name.text }
fields:
  - Have required Data Protection Impact Assessments (PIAs) been completed (§59.1-582)?: matters[i].vcdpa.posture.pia_assessments_completed
    datatype: yesnoradio
    show if: matters[i].vcdpa.include_opt_out_section
  - Have contracts with third parties been reviewed and updated for VCDPA compliance (§59.1-580)?: matters[i].vcdpa.posture.third_party_contracts_updated
    datatype: yesnoradio
