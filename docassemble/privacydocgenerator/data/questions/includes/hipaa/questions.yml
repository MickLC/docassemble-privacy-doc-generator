---
# ===============================================
# HIPAA APPLICABILITY + NOTICE OF PRIVACY PRACTICES
# Auto-detect-then-confirm screen (same UX as
# jurisdiction_engine.yml), followed by a short NPP
# question set. Most NPP language is fixed by 45 CFR
# §164.520's required elements and belongs in the
# template as boilerplate — these questions cover only
# the client-specific details. Only asked when
# matters[i].hipaa.status is requested (see main.yml);
# the NPP-detail question is only asked for covered
# entities — business associates don't issue an NPP.
#
# matters[i].hipaa must be explicitly initialised before
# any matters[i].hipaa.* field is asked — see the matching
# note in org_profile.yml.
# ===============================================
code: |
  matters[i].initializeAttribute('hipaa', DAObject)
  matters[i].hipaa_initialized = True
sets: matters[i].hipaa_initialized
---
question: |
  A few questions about health information — ${ matters[i].org.name.text }
subquestion: |
  A handful of yes/no questions to figure out whether HIPAA applies to the
  client's business, and if so, in what capacity. The legal labels
  (covered entity, business associate) get sorted out on the next screen —
  for now, just describe what the client actually does.
fields:
  - Does the client provide or administer health insurance coverage — for example, as an insurer, HMO, or an employer's group health plan?: matters[i].hipaa.is_health_plan
    datatype: yesnoradio
    hint: Legal category — health plan (45 CFR § 160.103)
  - Does the client provide healthcare and electronically bill insurance, check patient eligibility, or handle referral authorizations?: matters[i].hipaa.is_healthcare_provider_conducting_transactions
    datatype: yesnoradio
    hint: Legal category — healthcare provider conducting HIPAA-covered transactions
  - Does the client process or reformat health information passing between healthcare providers and insurers — for example, running a billing or claims clearinghouse?: matters[i].hipaa.is_healthcare_clearinghouse
    datatype: yesnoradio
    hint: Legal category — healthcare clearinghouse
  - Does the client handle patient health information as a vendor or service provider to a healthcare provider or insurer — for example, billing, IT, or software services?: matters[i].hipaa.handles_phi_for_covered_entity
    datatype: yesnoradio
    hint: Legal category — business associate handling PHI on behalf of a covered entity
---
question: |
  HIPAA Status — ${ matters[i].org.name.text }
subquestion: |
  Based on your answers, the system suggests the status below. Review and
  adjust to reflect your professional judgment.

  Auto-detected: **${ matters[i].hipaa.auto_detected_status }**
fields:
  - label: Confirmed HIPAA status
    field: matters[i].hipaa.status
    datatype: radio
    choices:
      - covered_entity: Covered entity
      - business_associate: Business associate
      - none: Not subject to HIPAA
    default: |
      matters[i].hipaa.auto_detected_status
---
question: |
  HIPAA — Notice of Privacy Practices Details — ${ matters[i].org.name.text }
subquestion: |
  Most required NPP language is fixed by 45 CFR §164.520 and lives in the
  template as boilerplate — these answers cover only the client-specific
  details.
fields:
  - Privacy Official name: matters[i].hipaa.privacy_official_name
  - Privacy Official contact (phone and/or email): matters[i].hipaa.privacy_official_contact
  - Complaint contact, if different from the Privacy Official: matters[i].hipaa.complaint_contact
    required: False
  - Does the client use or disclose PHI for marketing or fundraising?: matters[i].hipaa.uses_phi_for_marketing_fundraising
    datatype: yesnoradio
  - Does the client's practice involve psychotherapy notes?: matters[i].hipaa.involves_psychotherapy_notes
    datatype: yesnoradio
