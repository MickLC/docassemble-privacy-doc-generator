---
objects:
  # complete_attribute='complete' is what makes matters.gather() actually
  # seek matters[i].complete for each item — without it, gather() never
  # asks for item completeness at all, so the whole per-matter question
  # sequence below (org, footprint, gdpr, ...) never gets triggered and
  # gather() just creates a blank item and asks "is there another?"
  - matters: DAList.using(object_type=DAObject, auto_gather=False, complete_attribute='complete')
  - attorney: Individual
---
# -----------------------------------------------
# MAIN INTERVIEW FLOW
# -----------------------------------------------
mandatory: True
code: |
  # Step 1: Attorney/firm setup (once per session)
  attorney_setup_done

  # Step 2: Gather all matters
  # This triggers there_are_any, then loops asking
  # matters[i].complete for each matter, then
  # asks there_is_another after each one.
  matters.gather()

  # Step 3: Session complete
  session_complete
---
# -----------------------------------------------
# MATTER COMPLETION TRIGGER
# Docassemble checks matters[i].complete to know
# when a matter is fully gathered. This code block
# sequences every screen for a single matter.
# -----------------------------------------------
code: |
  # --- Organisation profile ---
  matters[i].matter_ref
  matters[i].org_initialized
  matters[i].org.name.text
  matters[i].org.trading_name
  matters[i].org.industry
  matters[i].org.address.address
  matters[i].org.contact_email
  matters[i].org.website

  # --- Operational footprint ---
  matters[i].footprint_initialized
  matters[i].footprint.operating_regions
  matters[i].footprint.consumer_regions
  matters[i].footprint.annual_revenue
  matters[i].footprint.consumer_volume
  matters[i].footprint.sells_data
  matters[i].footprint.processes_sensitive_data
  matters[i].footprint.is_sba_small_business

  # --- Jurisdiction determination ---
  matters[i].confirmed_jurisdictions

  # --- HIPAA ---
  # Entity-type gate, separate from confirmed_jurisdictions (see
  # hipaa_engine.py / hipaa/logic.yml). NPP-specific details are only
  # asked for covered entities — business associates don't issue an NPP.
  matters[i].hipaa_initialized
  matters[i].hipaa.status
  if matters[i].hipaa.status == 'covered_entity':
    matters[i].hipaa.privacy_official_name
    matters[i].hipaa.privacy_official_contact
    matters[i].hipaa.complaint_contact
    matters[i].hipaa.uses_phi_for_marketing_fundraising
    matters[i].hipaa.involves_psychotherapy_notes

  # --- Current state assessment ---
  matters[i].current_state_initialized
  matters[i].current_state.collection_methods
  matters[i].current_state.storage_systems
  matters[i].current_state.existing_docs
  matters[i].current_state.vendor_count
  matters[i].current_state.vendor_contracts_include_dp_terms
  matters[i].current_state.shares_data_commercially
  matters[i].current_state.has_rights_request_procedure
  matters[i].current_state.has_opt_out_mechanism
  matters[i].current_state.has_had_breach
  matters[i].current_state.has_breach_response_plan
  matters[i].current_state.has_privacy_lead
  matters[i].current_state.has_staff_training
  matters[i].current_state.uses_automated_decisions

  # --- Data map: vendor/system inventory ---
  # Optional upfront pass — comes before processing_activities so any
  # systems already known can be entered now, but the attorney can skip
  # this (there_are_any = No) and instead add systems inline while
  # describing each processing activity (see the new_systems/merge
  # mechanic in processing_activities.yml, which appends into this same
  # list). systems_initialized runs the initializeAttribute code block
  # that makes matters[i].systems an actual DAList before .gather() is
  # called on it.
  matters[i].systems_initialized
  matters[i].systems.gather()

  # --- Processing activities ---
  # The central data model every downstream document reads from. Must
  # come before the universal data aggregate below, since
  # data.types_collected/data.purposes are unions across these activities.
  # Initialized here (before business_functions) rather than left to
  # processing_activities.yml's own init block, since business_functions'
  # seeding code needs the list to already exist to append into.
  matters[i].processing_activities_initialized

  # --- Business functions: conversational front door (Phase 4) ---
  # Every biz.* variable is referenced individually here, ahead of
  # business_functions_seeded, so all of it is fully resolved before that
  # code block runs. That code block calls
  # matters[i].processing_activities.appendObject() with side effects; if
  # any biz.* reference inside it were still undefined when it first ran,
  # docassemble would ask that question, restart the whole code block from
  # the top, and append duplicate processing-activity entries. Referencing
  # everything here first — plain variable lookups, no side effects — is
  # safe to restart and matches the existing if-guarded pattern used for
  # matters[i].gdpr.dpo.* below.
  matters[i].biz_initialized
  matters[i].biz.payroll_applies
  if matters[i].biz.payroll_applies:
    matters[i].biz.payroll_data_types
    matters[i].biz.payroll_job_applicants
  matters[i].biz.sales_applies
  if matters[i].biz.sales_applies:
    matters[i].biz.sales_data_types
  matters[i].biz.marketing_applies
  if matters[i].biz.marketing_applies:
    matters[i].biz.marketing_data_types
    matters[i].biz.marketing_targeted_ads
  matters[i].biz.support_applies
  if matters[i].biz.support_applies:
    matters[i].biz.support_data_types
  matters[i].biz.webit_applies
  if matters[i].biz.webit_applies:
    matters[i].biz.webit_data_types
  matters[i].business_functions_seeded

  matters[i].processing_activities.gather()
  matters[i].processing_activities_derived

  # --- DPIA / LIA assessments ---
  # Only asked for the subset of activities flagged is_high_risk /
  # relies_on_legitimate_interest above. See dpia_assessment.yml and
  # lia_assessment.yml for the three-deep (dpia.risks[k]) and one-deep
  # (lia.*) nesting mechanics respectively.
  matters[i].dpia_assessments_done
  matters[i].lia_assessments_done

  # --- Universal data processing ---
  # types_collected/purposes are now computed aggregates (see
  # universal_data_questions.yml) rather than directly-asked questions —
  # every existing consumer below keeps reading the same variable names.
  matters[i].data.types_collected
  matters[i].data.purposes
  matters[i].data.retention_period
  matters[i].data.third_party_sharing

  # --- GDPR ---
  if 'GDPR' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].gdpr_initialized
    matters[i].gdpr.lawful_bases
    matters[i].gdpr.processes_special_category
    matters[i].gdpr.international_transfers
    matters[i].gdpr.dpo_exists
    if matters[i].gdpr.dpo_exists:
      matters[i].gdpr.dpo.name.first
      matters[i].gdpr.dpo.name.last
      matters[i].gdpr.dpo.email
    matters[i].gdpr.supervisory_authority
    matters[i].gdpr.posture.privacy_notice_provided
    matters[i].gdpr.posture.cookie_consent_compliant
    matters[i].gdpr.posture.rights_procedure_documented
    # privacy_statement.docx reads these two, but docxtpl's Jinja2
    # rendering context can't pause to trigger docassemble's on-demand
    # sets: computation the way normal question-flow does -- an
    # attribute touched for the first time inside a template render just
    # logs "UndefinedError exception during document assembly" and
    # renders blank (or, when iterated in a {%p for %} loop, raises
    # TypeError: 'NoneType' object is not iterable). Force resolution
    # here, before documents ever run.
    matters[i].gdpr.applicable_rights
    matters[i].gdpr.transfer_mechanisms_reference

  # --- CCPA/CPRA ---
  if 'CCPA/CPRA' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].ccpa_initialized
    matters[i].ccpa.sells_pi
    matters[i].ccpa.shares_pi_for_advertising
    matters[i].ccpa.honours_gpc
    matters[i].ccpa.collects_spi
    matters[i].ccpa.service_providers
    matters[i].ccpa.rights_request_url
    matters[i].ccpa.uses_verification
    matters[i].ccpa.posture.notice_at_collection
    matters[i].ccpa.posture.policy_updated_12mo
    matters[i].ccpa.posture.policy_disclosures_complete
    if matters[i].ccpa.include_opt_out_section:
      matters[i].ccpa.posture.opt_out_mechanism_in_place
    matters[i].ccpa.posture.gpc_honoured
    if matters[i].ccpa.include_spi_limit_link:
      matters[i].ccpa.posture.spi_limit_mechanism_in_place
    matters[i].ccpa.posture.rights_procedure_45_days
    matters[i].ccpa.posture.deletion_verification_in_place
    # See the GDPR block above for why these must be forced here.
    matters[i].ccpa.applicable_rights
    matters[i].ccpa.sensitive_pi_categories_reference

  # --- TDPSA ---
  if 'TDPSA' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].tdpsa_initialized
    matters[i].tdpsa.role
    matters[i].tdpsa.targeted_advertising
    matters[i].tdpsa.sells_data
    matters[i].tdpsa.profiling_decisions
    matters[i].tdpsa.universal_opt_out_supported
    matters[i].tdpsa.dpa_completed
    matters[i].tdpsa.posture.privacy_notice_provided
    matters[i].tdpsa.posture.rights_procedure_45_days
    matters[i].tdpsa.posture.appeals_procedure
    if matters[i].tdpsa.include_opt_out_section:
      matters[i].tdpsa.posture.opt_out_mechanism_in_place
    matters[i].tdpsa.posture.uoom_supported
    matters[i].tdpsa.posture.dpa_assessments_completed
    # See the GDPR block above for why these must be forced here.
    matters[i].tdpsa.applicable_rights
    matters[i].tdpsa.sensitive_data_categories_reference

  # --- VCDPA ---
  if 'VCDPA' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].vcdpa_initialized
    matters[i].vcdpa.role
    matters[i].vcdpa.processes_sensitive_data
    matters[i].vcdpa.targeted_advertising
    matters[i].vcdpa.sells_data
    matters[i].vcdpa.profiling_opt_out
    matters[i].vcdpa.pia_completed
    matters[i].vcdpa.posture.privacy_notice_provided
    matters[i].vcdpa.posture.rights_procedure_45_days
    matters[i].vcdpa.posture.appeals_procedure
    if matters[i].vcdpa.include_opt_out_section:
      matters[i].vcdpa.posture.opt_out_mechanism_in_place
    matters[i].vcdpa.posture.sensitive_data_consent_obtained
    matters[i].vcdpa.posture.pia_assessments_completed
    matters[i].vcdpa.posture.third_party_contracts_updated
    # See the GDPR block above for why these must be forced here.
    matters[i].vcdpa.applicable_rights
    matters[i].vcdpa.sensitive_data_categories_reference

  # --- Shared-model state privacy acts (Phase 3 step 4 REUSE/ADAPT bucket:
  # IN, KY, CO, DE, MT, NE, NH, NJ, OR, RI, TN) ---
  # See docassemble/privacydocgenerator/state_privacy_acts.py for the
  # per-state citation/UOOM config this generic-object question set reads,
  # and BUILD_PLAN_PHASE6.md Phase 3 step 4 for the reuse-vs-bespoke
  # classification across all 16 new jurisdictions.
  matters[i].initializeAttribute('state_acts', DADict.using(object_type=StatePrivacyAct))
  for _spa_name in applicable_state_privacy_acts(matters[i]):
    matters[i].state_acts[_spa_name].jurisdiction_name = _spa_name
    matters[i].state_acts[_spa_name].matter = matters[i]
    matters[i].state_acts[_spa_name].initializeAttribute('posture', DAObject)
    matters[i].state_acts[_spa_name].role
    matters[i].state_acts[_spa_name].processes_sensitive_data
    if matters[i].state_acts[_spa_name].processes_sensitive_data:
      matters[i].state_acts[_spa_name].sensitive_data_consent
    matters[i].state_acts[_spa_name].targeted_advertising
    matters[i].state_acts[_spa_name].sells_data
    matters[i].state_acts[_spa_name].profiling_opt_out
    matters[i].state_acts[_spa_name].pia_completed
    if matters[i].state_acts[_spa_name].pia_completed:
      matters[i].state_acts[_spa_name].pia_activities
    matters[i].state_acts[_spa_name].posture.privacy_notice_provided
    matters[i].state_acts[_spa_name].posture.rights_procedure_45_days
    matters[i].state_acts[_spa_name].posture.appeals_procedure
    if matters[i].state_acts[_spa_name].include_opt_out_section:
      matters[i].state_acts[_spa_name].posture.opt_out_mechanism_in_place
    if matters[i].state_acts[_spa_name].requires_uoom:
      matters[i].state_acts[_spa_name].posture.uoom_honored
    if matters[i].state_acts[_spa_name].processes_sensitive_data:
      matters[i].state_acts[_spa_name].posture.sensitive_data_consent_obtained
    if matters[i].state_acts[_spa_name].pia_completed:
      matters[i].state_acts[_spa_name].posture.pia_assessments_completed
    matters[i].state_acts[_spa_name].posture.third_party_contracts_updated
    # privacy_statement.docx reads these two, but docxtpl's Jinja2
    # rendering context can't pause to trigger docassemble's on-demand
    # sets: computation the way normal question-flow does -- an
    # attribute touched for the first time inside a template render just
    # logs "UndefinedError exception during document assembly" and
    # renders blank instead of computing. Force resolution here, before
    # documents ever run.
    matters[i].state_acts[_spa_name].applicable_rights
    matters[i].state_acts[_spa_name].sensitive_data_categories_reference
  # state_acts is populated directly above, not via .gather() -- but
  # DADict.values() (called by analyse_state_privacy_gaps() and
  # review.yml) still triggers docassemble's auto-gather machinery on any
  # DADict whose `gathered` flag isn't set, which looks for a
  # there_is_another question that was deliberately never built for this
  # dict. Mark it gathered explicitly so that machinery no-ops.
  matters[i].state_acts.gathered = True

  # --- Maryland Online Data Privacy Act (bespoke — Phase 3 step 4) ---
  if 'Maryland Online Data Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].md_initialized
    matters[i].md.role
    matters[i].md.processes_sensitive_data
    if matters[i].md.processes_sensitive_data:
      matters[i].md.sensitive_data_necessity_only
      matters[i].md.sells_sensitive_data
    matters[i].md.processes_consumer_health_data
    if matters[i].md.processes_consumer_health_data:
      matters[i].md.uses_health_facility_geofencing
    matters[i].md.targeted_advertising
    matters[i].md.sells_data
    matters[i].md.profiling_opt_out
    matters[i].md.knows_processes_under_18
    matters[i].md.pia_completed
    if matters[i].md.pia_completed:
      matters[i].md.pia_activities
    matters[i].md.posture.privacy_notice_provided
    matters[i].md.posture.rights_procedure_45_days
    matters[i].md.posture.appeals_procedure
    if matters[i].md.include_opt_out_section:
      matters[i].md.posture.opt_out_mechanism_in_place
      matters[i].md.posture.uoom_honored
    if matters[i].md.processes_sensitive_data:
      matters[i].md.posture.sensitive_data_restriction_honored
    if matters[i].md.uses_health_facility_geofencing:
      matters[i].md.posture.geofencing_restriction_honored
    if matters[i].md.knows_processes_under_18:
      matters[i].md.posture.under_18_restriction_honored
    if matters[i].md.pia_completed:
      matters[i].md.posture.pia_assessments_completed
    matters[i].md.posture.third_party_contracts_updated
    # See the shared-template loop above for why these must be forced
    # here rather than left to resolve when privacy_statement.docx
    # first references them.
    matters[i].md.applicable_rights
    matters[i].md.sensitive_data_categories_reference

  # --- Minnesota Consumer Data Privacy Act (bespoke — Phase 3 step 4) ---
  if 'Minnesota Consumer Data Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].mn_initialized
    matters[i].mn.role
    matters[i].mn.processes_sensitive_data
    if matters[i].mn.processes_sensitive_data:
      matters[i].mn.sensitive_data_consent
    matters[i].mn.processes_teen_13_16_data
    if matters[i].mn.processes_teen_13_16_data:
      matters[i].mn.teen_ad_sale_consent_obtained
    matters[i].mn.targeted_advertising
    matters[i].mn.sells_data
    matters[i].mn.profiling_opt_out
    matters[i].mn.pia_completed
    if matters[i].mn.pia_completed:
      matters[i].mn.pia_activities
    matters[i].mn.has_documented_privacy_program
    matters[i].mn.posture.privacy_notice_provided
    matters[i].mn.posture.rights_procedure_45_days
    matters[i].mn.posture.appeals_procedure
    if matters[i].mn.include_opt_out_section:
      matters[i].mn.posture.opt_out_mechanism_in_place
      matters[i].mn.posture.uoom_honored
    if matters[i].mn.profiling_opt_out:
      matters[i].mn.posture.profiling_explanation_procedure_in_place
    if matters[i].mn.processes_sensitive_data:
      matters[i].mn.posture.sensitive_data_consent_obtained
    if matters[i].mn.pia_completed:
      matters[i].mn.posture.pia_assessments_completed
    if matters[i].mn.has_documented_privacy_program:
      matters[i].mn.posture.privacy_program_documented
    matters[i].mn.posture.third_party_contracts_updated
    matters[i].mn.applicable_rights
    matters[i].mn.sensitive_data_categories_reference

  # --- Connecticut Data Privacy Act (bespoke — Phase 3 step 4) ---
  if 'Connecticut Data Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].ct_initialized
    matters[i].ct.role
    matters[i].ct.processes_sensitive_data
    if matters[i].ct.processes_sensitive_data:
      matters[i].ct.sensitive_data_consent
    matters[i].ct.processes_consumer_health_data
    matters[i].ct.targeted_advertising
    matters[i].ct.sells_data
    matters[i].ct.profiling_opt_out
    matters[i].ct.operates_social_media_platform
    matters[i].ct.pia_completed
    if matters[i].ct.pia_completed:
      matters[i].ct.pia_activities
    if matters[i].ct.profiling_opt_out:
      matters[i].ct.profiling_impact_assessment_completed
    matters[i].ct.posture.privacy_notice_provided
    matters[i].ct.posture.rights_procedure_45_days
    matters[i].ct.posture.appeals_procedure
    if matters[i].ct.include_opt_out_section:
      matters[i].ct.posture.opt_out_mechanism_in_place
      matters[i].ct.posture.uoom_honored
    if matters[i].ct.processes_sensitive_data:
      matters[i].ct.posture.sensitive_data_consent_obtained
    if matters[i].ct.operates_social_media_platform:
      matters[i].ct.posture.kids_code_procedure_in_place
    if matters[i].ct.processes_consumer_health_data:
      matters[i].ct.posture.chd_compliance_note
    if matters[i].ct.pia_completed:
      matters[i].ct.posture.pia_assessments_completed
    matters[i].ct.posture.third_party_contracts_updated
    matters[i].ct.applicable_rights
    matters[i].ct.sensitive_data_categories_reference

  # --- Iowa Consumer Data Protection Act (bespoke — Phase 3 step 4) ---
  if 'Iowa Consumer Data Protection Act' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].ia_initialized
    matters[i].ia.role
    matters[i].ia.processes_sensitive_data
    if matters[i].ia.processes_sensitive_data:
      matters[i].ia.sensitive_data_opt_out_provided
    matters[i].ia.sells_data
    matters[i].ia.posture.privacy_notice_provided
    matters[i].ia.posture.rights_procedure_90_days
    matters[i].ia.posture.appeals_procedure
    if matters[i].ia.include_opt_out_section:
      matters[i].ia.posture.opt_out_mechanism_in_place
    if matters[i].ia.processes_sensitive_data:
      matters[i].ia.posture.sensitive_data_notice_in_place
    matters[i].ia.posture.third_party_contracts_updated
    matters[i].ia.applicable_rights
    matters[i].ia.sensitive_data_categories_reference

  # --- Utah Consumer Privacy Act (bespoke — Phase 3 step 4) ---
  if 'Utah Consumer Privacy Act' in matters[i].confirmed_jurisdictions.true_values():
    matters[i].ut_initialized
    matters[i].ut.role
    matters[i].ut.processes_sensitive_data
    if matters[i].ut.processes_sensitive_data:
      matters[i].ut.sensitive_data_opt_out_provided
    matters[i].ut.targeted_advertising
    matters[i].ut.sells_data
    matters[i].ut.posture.privacy_notice_provided
    matters[i].ut.posture.rights_procedure_45_days
    if matters[i].ut.include_opt_out_section:
      matters[i].ut.posture.opt_out_mechanism_in_place
    if matters[i].ut.processes_sensitive_data:
      matters[i].ut.posture.sensitive_data_notice_in_place
    matters[i].ut.posture.third_party_contracts_updated
    matters[i].ut.applicable_rights
    matters[i].ut.sensitive_data_categories_reference

  # --- Playbooks: regulator/DSR/breach contacts, DPIA-trigger flag ---
  matters[i].playbooks_initialized
  matters[i].requires_privacy_assessment
  matters[i].playbooks.regulator_contact
  matters[i].playbooks.dsr_intake_channel
  matters[i].playbooks.dsr_intake_detail
  matters[i].playbooks.breach_counsel_retained
  matters[i].playbooks.breach_escalation_contact
  matters[i].playbooks.breach_notification_states
  matters[i].playbooks.breach_requirements
  matters[i].playbooks.staff_trained

  # --- Run gap analysis ---
  matters[i].gap_analysis = run_gap_analysis(matters[i])

  # --- Review ---
  matters[i].review_done

  # --- Generate documents ---
  matters[i].document_list
  matters[i].documents_generated

  # Mark this matter complete for the DAList gather loop
  matters[i].complete = True
sets: matters[i].complete
---
# -----------------------------------------------
# SESSION COMPLETE
# -----------------------------------------------
question: Session Complete
subquestion: |
  All matters for this session have been processed.

  % for matter in matters:
  - **${ matter.org.name.text }** (${ matter.matter_ref }) &mdash;
  ${ comma_and_list(matter.confirmed_jurisdictions.true_values()) }
  % endfor
buttons:
  - Exit: exit
  - Restart: restart
event: session_complete
